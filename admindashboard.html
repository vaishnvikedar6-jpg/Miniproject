<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Control Center | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --princess-pink: #fbcfe8;
            --deep-purple: #4c1d95;
            --soft-purple: #a78bfa;
            --hot-pink: #db2777;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f3ff 0%, #fdf2f8 100%);
            color: var(--deep-purple);
        }

        /* Responsive Sidebar/Header Logic */
        header {
            background: var(--deep-purple);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .main-layout {
            display: flex;
            flex: 1;
        }

        /* Sidebar - Hidden on small screens, shown on desktop */
        .sidebar {
            width: 260px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(76, 29, 149, 0.1);
            padding: 30px 20px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* Mobile var sidebar kadhun takla */
            .stats-grid { grid-template-columns: 1fr 1fr !important; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr !important; }
            header h2 { font-size: 18px; }
        }

        .nav-link {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            color: var(--deep-purple);
        }

        .nav-link:hover, .nav-link.active {
            background: var(--princess-pink);
            color: var(--hot-pink);
        }

        /* Dashboard Content */
        .content { flex: 1; padding: 30px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(76, 29, 149, 0.05);
            border: 2px solid transparent;
        }

        /* Custom Colors for each box */
        .stat-card.academic { border-bottom: 6px solid var(--soft-purple); }
        .stat-card.infra { border-bottom: 6px solid var(--hot-pink); }
        .stat-card.clean { border-bottom: 6px solid #fb7185; }
        .stat-card.urgent { border-bottom: 6px solid var(--deep-purple); background: #fff1f2; }

        .stat-card h3 { font-size: 32px; margin: 0; color: var(--deep-purple); }
        .stat-card p { font-size: 14px; font-weight: 600; margin: 5px 0 0; opacity: 0.7; }

        /* Data Section */
        .records-section {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #f3f4f6;
            flex-wrap: wrap;
            gap: 15px;
        }

        .record-info h4 { margin: 0; font-size: 18px; }
        .dept-badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--princess-pink);
            color: var(--hot-pink);
            font-weight: 800;
            text-transform: uppercase;
        }

        .btn-status {
            background: var(--deep-purple);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-status:hover { transform: scale(1.05); background: var(--hot-pink); }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0;">✨ SGMS Admin</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-link active">🏠 Overview</div>
            <div class="nav-link">📂 Departments</div>
            <div class="nav-link">👤 Student List</div>
            <div class="nav-link">⚙️ Settings</div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card academic">
                    <h3 id="cnt-academic">0</h3>
                    <p>Academic</p>
                </div>
                <div class="stat-card infra">
                    <h3 id="cnt-infra">0</h3>
                    <p>Infrastructure</p>
                </div>
                <div class="stat-card clean">
                    <h3 id="cnt-clean">0</h3>
                    <p>Cleanliness</p>
                </div>
                <div class="stat-card urgent">
                    <h3 id="cnt-urgent">0</h3>
                    <p style="color: var(--hot-pink);">🚨 Bullying</p>
                </div>
            </div>

            <div class="records-section">
                <h3 style="margin-top:0;">Live Feed</h3>
                <div id="grievanceList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        function loadAdminData() {
            const list = JSON.parse(localStorage.getItem('grievances')) || [];
            const container = document.getElementById('grievanceList');
            
            // Stats calculation
            document.getElementById('cnt-academic').innerText = list.filter(i => i.category === 'Academic Help').length;
            document.getElementById('cnt-infra').innerText = list.filter(i => i.category === 'College Infrastructure').length;
            document.getElementById('cnt-clean').innerText = list.filter(i => i.category === 'Cleanliness').length;
            document.getElementById('cnt-urgent').innerText = list.filter(i => i.category.includes('URGENT')).length;

            if(list.length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:20px;'>Hajun tari kontich complaint aali nahiye. 😊</p>";
                return;
            }

            container.innerHTML = list.map((item, index) => `
                <div class="record-item">
                    <div class="record-info">
                        <span class="dept-badge">${item.category}</span>
                        <h4>${item.name} <small style="font-weight:400; opacity:0.6;">| PRN: ${item.prn}</small></h4>
                        <p style="margin:5px 0; font-size:14px; color:#666;">${item.text}</p>
                        <small style="color:var(--soft-purple)">${item.date} • <b>Status: ${item.status}</b></small>
                    </div>
                    <div>
                        <button class="btn-status" onclick="cycleStatus(${index})">Update</button>
                    </div>
                </div>
            `).join('');
        }

        function cycleStatus(idx) {
            let list = JSON.parse(localStorage.getItem('grievances'));
            const states = ["Pending", "In Progress", "Resolved"];
            let current = states.indexOf(list[idx].status);
            list[idx].status = states[(current + 1) % 3];
            localStorage.setItem('grievances', JSON.stringify(list));
            loadAdminData();
        }

        function logout() { sessionStorage.clear(); window.location.href = "adminform.html"; }

        loadAdminData();
    </script>
</body>
</html>

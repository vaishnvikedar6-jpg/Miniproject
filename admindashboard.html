<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Luxury Admin | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme Colors */
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --princess-pink: #fbcfe8;
            --deep-purple: #7c3aed; /* Thoda bright purple for dark mode */
            --hot-pink: #f472b6;
            --text-gray: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            background-color: var(--bg-dark);
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-layout { display: flex; flex: 1; }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(15, 23, 42, 0.9);
            padding: 30px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .stats-grid { grid-template-columns: 1fr 1fr !important; }
        }

        .nav-link {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-gray);
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(124, 58, 237, 0.2);
            color: var(--princess-pink);
            border-left: 3px solid var(--hot-pink);
        }

        /* Content Area */
        .content { flex: 1; padding: 30px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-dark);
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card h3 { font-size: 32px; margin: 0; color: var(--hot-pink); }
        .stat-card p { font-size: 13px; font-weight: 600; margin: 5px 0 0; color: var(--text-gray); }

        /* Issues Feed */
        .feed-container {
            background: var(--card-dark);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .issue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 15px;
        }

        .issue-item:last-child { border-bottom: none; }

        .badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(244, 114, 182, 0.15);
            color: var(--hot-pink);
            font-weight: 800;
            text-transform: uppercase;
        }

        .issue-text h4 { margin: 10px 0 5px 0; color: var(--princess-pink); }
        .issue-text p { margin: 0; font-size: 14px; color: #cbd5e1; line-height: 1.5; }

        .btn-update {
            background: var(--deep-purple);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .btn-update:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .logout-btn {
            background: rgba(244, 114, 182, 0.2);
            border: 1px solid var(--hot-pink);
            color: var(--hot-pink);
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; background: linear-gradient(to right, #fbcfe8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            ✨ SGMS Portal
        </h2>
        <button class="logout-btn" onclick="logout()">Log out</button>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-link active">🏠 Dashboard</div>
            <div class="nav-link">📂 Categories</div>
            <div class="nav-link">📊 Reports</div>
            <div class="nav-link" style="margin-top: 100px;">⚙️ Settings</div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="stat-academic">0</h3>
                    <p>Academic</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-infra">0</h3>
                    <p>Infrastructure</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-clean">0</h3>
                    <p>Cleanliness</p>
                </div>
                <div class="stat-card" style="background: rgba(124, 58, 237, 0.05);">
                    <h3 id="stat-urgent" style="color: #ff4d4d;">0</h3>
                    <p>🚨 Bullying</p>
                </div>
            </div>

            <div class="feed-container">
                <h3 style="margin-top:0; color: var(--princess-pink);">Recent Activity</h3>
                <div id="issueList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        function loadDarkDashboard() {
            const list = JSON.parse(localStorage.getItem('grievances')) || [];
            const container = document.getElementById('issueList');
            
            // Counts
            document.getElementById('stat-academic').innerText = list.filter(i => i.category === 'Academic Help').length;
            document.getElementById('stat-infra').innerText = list.filter(i => i.category === 'College Infrastructure').length;
            document.getElementById('stat-clean').innerText = list.filter(i => i.category === 'Cleanliness').length;
            document.getElementById('stat-urgent').innerText = list.filter(i => i.category.includes('URGENT')).length;

            if(list.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:var(--text-gray); padding:30px;'>No new grievances to show.</p>";
                return;
            }

            container.innerHTML = list.map((item, index) => `
                <div class="issue-item">
                    <div class="issue-text">
                        <span class="badge">${item.category}</span>
                        <h4>${item.name} <span style="font-weight:400; font-size:12px; color:var(--text-gray);">| PRN: ${item.prn}</span></h4>
                        <p>${item.text}</p>
                        <div style="margin-top:8px; font-size:12px; color:var(--hot-pink);">Status: <b>${item.status}</b></div>
                    </div>
                    <button class="btn-update" onclick="changeStatus(${index})">Next Stage</button>
                </div>
            `).join('');
        }

        function changeStatus(idx) {
            let list = JSON.parse(localStorage.getItem('grievances'));
            const workflow = ["Pending", "In Progress", "Resolved"];
            let curr = workflow.indexOf(list[idx].status);
            list[idx].status = workflow[(curr + 1) % 3];
            localStorage.setItem('grievances', JSON.stringify(list));
            loadDarkDashboard();
        }

        function logout() { sessionStorage.clear(); window.location.href = "adminform.html"; }

        loadDarkDashboard();
    </script>
</body>
</html>

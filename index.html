<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Support | Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --princess-pink: #fbcfe8;
            --deep-purple: #4c1d95;
            --soft-purple: #a78bfa;
            --danger-red: #be123c;
            --gold: #fbbf24;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            overflow: hidden;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background: #0f172a;
            perspective: 1500px;
        }

        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, #4c1d95 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #db2777 0%, transparent 40%),
                        linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 10;
            transform-style: preserve-3d;
        }

        .card { 
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            padding: 45px; 
            border-radius: 45px; 
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            position: relative;
        }

        .progress-step {
            width: 40px;
            height: 40px;
            background: rgba(251, 207, 232, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 14px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .progress-step.active {
            background: var(--soft-purple);
            color: var(--deep-purple);
            box-shadow: 0 0 25px var(--soft-purple);
            transform: scale(1.15);
        }

        .header h2 { 
            margin: 0; 
            font-size: 34px; 
            font-weight: 800; 
            background: linear-gradient(to right, #fff, var(--princess-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: -1px;
        }

        .step-content { display: none; }
        .step-content.active { display: block; }

        .form-group { margin-bottom: 25px; transform-style: preserve-3d; }

        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 700; 
            font-size: 11px;
            color: var(--princess-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        input, textarea, select { 
            width: 100%; 
            padding: 18px 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 22px; 
            font-size: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus { 
            outline: none;
            border-color: var(--soft-purple);
            background: rgba(255, 255, 255, 0.1);
            transform: translateZ(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .bullying-section {
            background: rgba(190, 18, 60, 0.1);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(190, 18, 60, 0.3);
            margin-bottom: 25px;
            transition: 0.4s;
        }

        .bullying-section.alert-active {
            background: rgba(190, 18, 60, 0.25);
            border-color: var(--danger-red);
            box-shadow: 0 0 30px rgba(190, 18, 60, 0.2);
        }

        .btn { 
            flex: 1;
            background: white; 
            color: var(--deep-purple); 
            border: none; 
            padding: 20px; 
            border-radius: 24px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 800; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover { 
            transform: translateZ(30px) translateY(-5px);
            background: var(--princess-pink);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        textarea { height: 130px; resize: none; }
    </style>
</head>
<body>

    <div class="animated-bg"></div>
    <div class="orb" style="width: 400px; height: 400px; top: -100px; left: -100px; background: #4c1d95;"></div>
    <div class="orb" style="width: 350px; height: 350px; bottom: -50px; right: -50px; background: #db2777;"></div>

    <div class="container">
        <div class="card" id="mainCard">
            <div class="progress-container">
                <div class="progress-step active" id="p1">1</div>
                <div class="progress-step" id="p2">2</div>
                <div class="progress-step" id="p3">3</div>
            </div>

            <form id="grievanceForm">
                <div class="step-content active" id="step1">
                    <div class="header" style="margin-bottom: 30px;">
                        <h2>Identification</h2>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Vaishnavi Kedar" required>
                    </div>
                    <div class="form-group">
                        <label>Student ID (PRN)</label>
                        <input type="text" id="prn" placeholder="124AXXXX" required>
                    </div>
                    <button type="button" class="btn" onclick="nextStep(2)">Continue</button>
                </div>

                <div class="step-content" id="step2">
                    <div class="header" style="margin-bottom: 30px;">
                        <h2>What's Happening?</h2>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option>Academic Help</option>
                            <option>College Infrastructure</option>
                            <option>Wellbeing & Support</option>
                        </select>
                    </div>
                    <div class="bullying-section" id="bSec">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" id="isBullying" style="width: 20px; height: 20px;" onchange="toggleUrgency()">
                            <span style="color: #fda4af; font-weight: 800; font-size: 14px;">Urgent: Reporting Harassment</span>
                        </label>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <button type="button" class="btn btn-secondary" onclick="nextStep(1)">Back</button>
                        <button type="button" class="btn" onclick="nextStep(3)">Details</button>
                    </div>
                </div>

                <div class="step-content" id="step3">
                    <div class="header" style="margin-bottom: 30px;">
                        <h2>Share Details</h2>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="complaint" placeholder="Tell us more so we can help..." required></textarea>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <button type="button" class="btn btn-secondary" onclick="nextStep(2)">Back</button>
                        <button type="submit" class="btn" style="background: var(--soft-purple);">Submit Ticket</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const card = document.getElementById('mainCard');
        
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        gsap.from(".card", { duration: 1.2, y: 100, opacity: 0, ease: "power4.out" });
        gsap.from(".orb", { duration: 2, scale: 0, opacity: 0, stagger: 0.3, ease: "elastic.out(1, 0.5)" });

        function nextStep(step) {
            gsap.to(".step-content.active", { duration: 0.3, x: -20, opacity: 0, onComplete: () => {
                document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
                document.getElementById('step' + step).classList.add('active');
                
                gsap.fromTo("#step" + step, { x: 20, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 });
                
                document.querySelectorAll('.progress-step').forEach(p => p.classList.remove('active'));
                for(let i=1; i<=step; i++) {
                    document.getElementById('p' + i).classList.add('active');
                }
            }});
        }

        function toggleUrgency() {
            document.getElementById('bSec').classList.toggle('alert-active');
            gsap.from(".alert-active", { duration: 0.4, scale: 1.02, yoyo: true, repeat: 1 });
        }

        document.getElementById('grievanceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            gsap.to(".card", { duration: 0.5, scale: 0.9, opacity: 0, ease: "power2.in", onComplete: () => {
                alert("Report submitted securely.");
                window.location.href = "dashboard.html";
            }});
        });
    </script>
</body>
</html>

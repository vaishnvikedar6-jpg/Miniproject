<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Support | Premium Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --princess-pink: #fbcfe8;
            --deep-purple: #4c1d95;
            --soft-purple: #a78bfa;
            --danger-red: #be123c;
            --gold: #fbbf24;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            overflow: hidden;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background: linear-gradient(45deg, #4c1d95, #db2777, #7c3aed);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 10;
        }

        .card { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-step {
            width: 35px;
            height: 35px;
            background: var(--princess-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--deep-purple);
            font-size: 14px;
            z-index: 2;
            transition: 0.4s;
        }

        .progress-step.active {
            background: var(--deep-purple);
            color: white;
            box-shadow: 0 0 15px rgba(76, 29, 149, 0.4);
        }

        .header h2 { 
            margin: 0; 
            font-size: 32px; 
            font-weight: 800; 
            background: linear-gradient(to right, var(--deep-purple), #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .step-content { display: none; animation: fadeIn 0.5s ease; }
        .step-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 700; 
            font-size: 13px;
            color: var(--deep-purple);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea, select { 
            width: 100%; 
            padding: 16px 20px; 
            border: 2px solid transparent; 
            border-radius: 20px; 
            font-size: 15px;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus { 
            outline: none;
            border-color: var(--soft-purple);
            background: white;
            transform: scale(1.02);
        }

        .bullying-section {
            background: rgba(190, 18, 60, 0.05);
            border-radius: 24px;
            padding: 20px;
            border: 2px dashed rgba(190, 18, 60, 0.2);
            transition: 0.3s;
        }

        .bullying-section.alert-active {
            background: #fff1f2;
            border-color: var(--danger-red);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn { 
            flex: 1;
            background: linear-gradient(135deg, #7c3aed, #db2777); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 22px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 700; 
            transition: 0.3s;
        }

        .btn-secondary {
            background: rgba(76, 29, 149, 0.1);
            color: var(--deep-purple);
        }

        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(124, 58, 237, 0.5);
        }

        textarea { height: 120px; }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
        <div class="blob" style="width: 300px; height: 300px; bottom: -50px; right: -50px; background: rgba(219, 39, 119, 0.2);"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="progress-container">
                <div class="progress-step active" id="p1">1</div>
                <div class="progress-step" id="p2">2</div>
                <div class="progress-step" id="p3">3</div>
            </div>

            <form id="grievanceForm">
                <div class="step-content active" id="step1">
                    <div class="header" style="margin-bottom: 25px;">
                        <h2>Identification</h2>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="E.g. Vaishnavi Kedar" required>
                    </div>
                    <div class="form-group">
                        <label>Student ID (PRN)</label>
                        <input type="text" id="prn" placeholder="124AXXXX" required>
                    </div>
                    <button type="button" class="btn" onclick="nextStep(2)">Continue</button>
                </div>

                <div class="step-content" id="step2">
                    <div class="header" style="margin-bottom: 25px;">
                        <h2>Context</h2>
                    </div>
                    <div class="form-group">
                        <label>Issue Category</label>
                        <select id="category">
                            <option>Academic Help</option>
                            <option>College Infrastructure</option>
                            <option>Wellbeing & Support</option>
                        </select>
                    </div>
                    <div class="bullying-section" id="bSec">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="isBullying" style="width: 20px; height: 20px;" onchange="toggleUrgency()">
                            <span style="color: var(--danger-red); font-weight: 800;">Urgent: Harassment</span>
                        </label>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="nextStep(1)">Back</button>
                        <button type="button" class="btn" onclick="nextStep(3)">Details</button>
                    </div>
                </div>

                <div class="step-content" id="step3">
                    <div class="header" style="margin-bottom: 25px;">
                        <h2>The Details</h2>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="complaint" placeholder="Describe your concern in detail..." required></textarea>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" onclick="nextStep(2)">Back</button>
                        <button type="submit" class="btn">Submit Report</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.progress-step').forEach(p => p.classList.remove('active'));
            
            document.getElementById('step' + step).classList.add('active');
            for(let i=1; i<=step; i++) {
                document.getElementById('p' + i).classList.add('active');
            }
        }

        function toggleUrgency() {
            const sec = document.getElementById('bSec');
            sec.classList.toggle('alert-active');
        }

        document.getElementById('grievanceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const isBullying = document.getElementById('isBullying').checked;
            
            const data = {
                id: Date.now(),
                name: document.getElementById('name').value,
                prn: document.getElementById('prn').value,
                category: isBullying ? "🚨 PRIORITY" : document.getElementById('category').value,
                text: document.getElementById('complaint').value,
                status: "Received",
                date: new Date().toLocaleDateString()
            };

            let list = JSON.parse(localStorage.getItem('grievances')) || [];
            list.push(data);
            localStorage.setItem('grievances', JSON.stringify(list));

            alert("Thank you. Your support ticket has been created.");
            window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
